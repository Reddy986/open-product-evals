<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Open Product Evals</title>
  <desc id="description">Social preview showing transparent LLM evaluation gates and a rejected product decision.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0a1728"/>
      <stop offset="1" stop-color="#111b31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#55e6a5"/>
      <stop offset="1" stop-color="#53b7ff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8aa1bd" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000814" flood-opacity="0.46"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1100" cy="80" r="250" fill="#2e87ff" opacity="0.08"/>
  <circle cx="1060" cy="610" r="290" fill="#3ee6a4" opacity="0.06"/>

  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(76 70)">
      <rect width="12" height="12" rx="3" fill="#55e6a5"/>
      <text x="25" y="11" fill="#9fb2c8" font-size="16" font-weight="700" letter-spacing="2.4">AJIT MAHAREDDY · OPEN SOURCE</text>
    </g>

    <text x="72" y="220" fill="#f5f8fc" font-size="84" font-weight="760" letter-spacing="-3">Open Product</text>
    <text x="72" y="308" fill="url(#accent)" font-size="96" font-weight="800" letter-spacing="-3">Evals</text>

    <text x="76" y="377" fill="#bdcadd" font-size="27" font-weight="520">Raw runs. Frozen gates. Published failures.</text>

    <g transform="translate(76 435)">
      <g>
        <rect width="114" height="38" rx="19" fill="#14253a" stroke="#29405b"/>
        <text x="57" y="25" fill="#b9c9dc" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1.2">DATASET</text>
      </g>
      <path d="M 126 19 H 158" stroke="#55708d" stroke-width="2"/>
      <path d="M 153 14 L 160 19 153 24" fill="none" stroke="#55708d" stroke-width="2"/>
      <g transform="translate(172)">
        <rect width="90" height="38" rx="19" fill="#14253a" stroke="#29405b"/>
        <text x="45" y="25" fill="#b9c9dc" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1.2">RUN</text>
      </g>
      <path d="M 274 19 H 306" stroke="#55708d" stroke-width="2"/>
      <path d="M 301 14 L 308 19 301 24" fill="none" stroke="#55708d" stroke-width="2"/>
      <g transform="translate(320)">
        <rect width="94" height="38" rx="19" fill="#14253a" stroke="#29405b"/>
        <text x="47" y="25" fill="#b9c9dc" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1.2">GATE</text>
      </g>
      <path d="M 426 19 H 458" stroke="#55708d" stroke-width="2"/>
      <path d="M 453 14 L 460 19 453 24" fill="none" stroke="#55708d" stroke-width="2"/>
      <g transform="translate(472)">
        <rect width="112" height="38" rx="19" fill="#132a2d" stroke="#2f6958"/>
        <text x="56" y="25" fill="#63e7ac" font-size="14" font-weight="750" text-anchor="middle" letter-spacing="1.1">DECIDE</text>
      </g>
    </g>

    <text x="76" y="574" fill="#7288a2" font-size="18" font-weight="560">github.com/Reddy986/open-product-evals</text>

    <g transform="translate(760 86)" filter="url(#shadow)">
      <rect width="440" height="468" rx="28" fill="#0d1b2d" stroke="#263b54" stroke-width="2"/>
      <rect x="1" y="1" width="438" height="76" rx="27" fill="#112238"/>
      <circle cx="34" cy="38" r="7" fill="#55e6a5"/>
      <text x="55" y="44" fill="#dce6f1" font-size="18" font-weight="760" letter-spacing="1.5">HELD-OUT PRODUCT GATE</text>

      <g transform="translate(32 104)">
        <text y="20" fill="#90a5bd" font-size="16" font-weight="650">VALID SCHEMA</text>
        <text x="250" y="20" fill="#eef4fa" font-size="22" font-weight="760" text-anchor="end">100%</text>
        <rect x="276" y="0" width="98" height="30" rx="15" fill="#123a31"/>
        <text x="325" y="21" fill="#64e9ad" font-size="14" font-weight="800" text-anchor="middle" letter-spacing="1.1">PASS</text>
      </g>
      <line x1="32" y1="157" x2="408" y2="157" stroke="#233750"/>

      <g transform="translate(32 184)">
        <text y="20" fill="#90a5bd" font-size="16" font-weight="650">ESCALATION RECALL</text>
        <text x="250" y="20" fill="#eef4fa" font-size="22" font-weight="760" text-anchor="end">90%</text>
        <rect x="276" y="0" width="98" height="30" rx="15" fill="#123a31"/>
        <text x="325" y="21" fill="#64e9ad" font-size="14" font-weight="800" text-anchor="middle" letter-spacing="1.1">PASS</text>
      </g>
      <line x1="32" y1="237" x2="408" y2="237" stroke="#233750"/>

      <g transform="translate(32 264)">
        <text y="20" fill="#90a5bd" font-size="16" font-weight="650">EXACT MATCH</text>
        <text x="250" y="20" fill="#eef4fa" font-size="22" font-weight="760" text-anchor="end">60%</text>
        <rect x="276" y="0" width="98" height="30" rx="15" fill="#43242c"/>
        <text x="325" y="21" fill="#ff8897" font-size="14" font-weight="800" text-anchor="middle" letter-spacing="1.1">FAIL</text>
      </g>
      <line x1="32" y1="317" x2="408" y2="317" stroke="#233750"/>

      <g transform="translate(32 348)">
        <text y="18" fill="#7288a2" font-size="14" font-weight="700" letter-spacing="1.3">DECISION</text>
        <text y="61" fill="#ff8a98" font-size="34" font-weight="820" letter-spacing="0.5">REJECT PROTOTYPE</text>
        <text y="91" fill="#8fa4bc" font-size="15">One missed gate means no ship.</text>
      </g>
    </g>
  </g>
</svg>
