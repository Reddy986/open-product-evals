name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python3 -m unittest discover -v
      - name: Compile sources
        run: python3 -m compileall -q open_product_evals run_eval.py run_baseline.py compare_results.py compare_variants.py calibrate_rubric.py
